title: "Epithelial Histology"
date: "February 2023"
short_summary: >
  This is another post I wrote my senior year of high school. I was taking an anatomy and physiology class at the time.
  Disclaimer: if you don't want to see pictures of my cut-up finger, don't click on the link below.
content: |
  This post contains the "Middle Finger Diaries", a completely unnecessary but very real documentation of what 
  happens when you combine a busy kitchen shift, a slicer with serrated blades, and the false confidence of a teenager who thinks 
  they know what they are doing.

  There are a few images for context, so this is your warning now if you are not a fan of cuts, blood, or self-inflicted problems 
  involving sharp metal objects.

post_url: "https://thankgodtheseurlsaretemporary.blogspot.com/2023/02/epithelial-histology.html"